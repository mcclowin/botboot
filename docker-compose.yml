# BotBoot — Self-hosted setup
# Run: docker compose up

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: botboot
      POSTGRES_USER: botboot
      POSTGRES_PASSWORD: botboot-local
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botboot"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://botboot:botboot-local@db:5432/botboot
      PORT: "3001"

volumes:
  pgdata:
